{% extends 'base.html' %}
{% block title %}成绩管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>成绩管理</h3>
  <a href="{{ url_for('add_grade') }}" class="btn btn-primary">+ 添加成绩</a>
</div>
<table class="table table-bordered table-hover">
  <thead class="table-light">
    <tr>
      <th>学生姓名</th><th>学号</th><th>课程名称</th><th>成绩</th><th>操作</th>
    </tr>
  </thead>
  <tbody>
    {% for g in grades %}
    <tr>
      <td>{{ g.student.name }}</td>
      <td>{{ g.student.student_id }}</td>
      <td>{{ g.course.name }}</td>
      <td>{{ g.score if g.score is not none else '-' }}</td>
      <td>
        <a href="{{ url_for('edit_grade', id=g.id) }}" class="btn btn-sm btn-warning">编辑</a>
        <form method="post" action="{{ url_for('delete_grade', id=g.id) }}" class="d-inline"
              onsubmit="return confirm('确认删除该成绩？')">
          <button type="submit" class="btn btn-sm btn-danger">删除</button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="5" class="text-center text-muted">暂无成绩数据</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
