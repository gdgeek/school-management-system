{% extends 'base.html' %}
{% block title %}编辑学生{% endblock %}
{% block content %}
<h3 class="mb-3">编辑学生</h3>
<form method="post" class="col-md-6">
  <div class="mb-3">
    <label class="form-label">学号 *</label>
    <input type="text" name="student_id" class="form-control" value="{{ student.student_id }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">姓名 *</label>
    <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">性别</label>
    <select name="gender" class="form-select">
      <option value="">请选择</option>
      <option value="男" {% if student.gender == '男' %}selected{% endif %}>男</option>
      <option value="女" {% if student.gender == '女' %}selected{% endif %}>女</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">年龄</label>
    <input type="number" name="age" class="form-control" value="{{ student.age or '' }}" min="1" max="100">
  </div>
  <button type="submit" class="btn btn-primary">保存</button>
  <a href="{{ url_for('students') }}" class="btn btn-secondary ms-2">取消</a>
</form>
{% endblock %}
