{% extends 'base.html' %}
{% block title %}学生管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>学生管理</h3>
  <a href="{{ url_for('add_student') }}" class="btn btn-primary">+ 添加学生</a>
</div>
<table class="table table-bordered table-hover">
  <thead class="table-light">
    <tr>
      <th>学号</th><th>姓名</th><th>性别</th><th>年龄</th><th>操作</th>
    </tr>
  </thead>
  <tbody>
    {% for s in students %}
    <tr>
      <td>{{ s.student_id }}</td>
      <td>{{ s.name }}</td>
      <td>{{ s.gender or '-' }}</td>
      <td>{{ s.age or '-' }}</td>
      <td>
        <a href="{{ url_for('edit_student', id=s.id) }}" class="btn btn-sm btn-warning">编辑</a>
        <form method="post" action="{{ url_for('delete_student', id=s.id) }}" class="d-inline"
              onsubmit="return confirm('确认删除该学生？')">
          <button type="submit" class="btn btn-sm btn-danger">删除</button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="5" class="text-center text-muted">暂无学生数据</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
