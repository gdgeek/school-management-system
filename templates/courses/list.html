{% extends 'base.html' %}
{% block title %}课程管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>课程管理</h3>
  <a href="{{ url_for('add_course') }}" class="btn btn-primary">+ 添加课程</a>
</div>
<table class="table table-bordered table-hover">
  <thead class="table-light">
    <tr>
      <th>课程号</th><th>课程名称</th><th>授课教师</th><th>操作</th>
    </tr>
  </thead>
  <tbody>
    {% for c in courses %}
    <tr>
      <td>{{ c.course_id }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.teacher.name if c.teacher else '-' }}</td>
      <td>
        <a href="{{ url_for('edit_course', id=c.id) }}" class="btn btn-sm btn-warning">编辑</a>
        <form method="post" action="{{ url_for('delete_course', id=c.id) }}" class="d-inline"
              onsubmit="return confirm('确认删除该课程？')">
          <button type="submit" class="btn btn-sm btn-danger">删除</button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="4" class="text-center text-muted">暂无课程数据</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
