{% extends 'base.html' %}
{% block title %}编辑课程{% endblock %}
{% block content %}
<h3 class="mb-3">编辑课程</h3>
<form method="post" class="col-md-6">
  <div class="mb-3">
    <label class="form-label">课程号 *</label>
    <input type="text" name="course_id" class="form-control" value="{{ course.course_id }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">课程名称 *</label>
    <input type="text" name="name" class="form-control" value="{{ course.name }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">授课教师</label>
    <select name="teacher_id" class="form-select">
      <option value="">请选择</option>
      {% for t in teachers %}
      <option value="{{ t.id }}" {% if course.teacher_id == t.id %}selected{% endif %}>{{ t.name }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-primary">保存</button>
  <a href="{{ url_for('courses') }}" class="btn btn-secondary ms-2">取消</a>
</form>
{% endblock %}
