{% extends 'base.html' %}
{% block title %}教师管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>教师管理</h3>
  <a href="{{ url_for('add_teacher') }}" class="btn btn-primary">+ 添加教师</a>
</div>
<table class="table table-bordered table-hover">
  <thead class="table-light">
    <tr>
      <th>工号</th><th>姓名</th><th>性别</th><th>学科</th><th>操作</th>
    </tr>
  </thead>
  <tbody>
    {% for t in teachers %}
    <tr>
      <td>{{ t.teacher_id }}</td>
      <td>{{ t.name }}</td>
      <td>{{ t.gender or '-' }}</td>
      <td>{{ t.subject or '-' }}</td>
      <td>
        <a href="{{ url_for('edit_teacher', id=t.id) }}" class="btn btn-sm btn-warning">编辑</a>
        <form method="post" action="{{ url_for('delete_teacher', id=t.id) }}" class="d-inline"
              onsubmit="return confirm('确认删除该教师？')">
          <button type="submit" class="btn btn-sm btn-danger">删除</button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="5" class="text-center text-muted">暂无教师数据</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
