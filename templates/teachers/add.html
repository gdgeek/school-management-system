{% extends 'base.html' %}
{% block title %}添加教师{% endblock %}
{% block content %}
<h3 class="mb-3">添加教师</h3>
<form method="post" class="col-md-6">
  <div class="mb-3">
    <label class="form-label">工号 *</label>
    <input type="text" name="teacher_id" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">姓名 *</label>
    <input type="text" name="name" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">性别</label>
    <select name="gender" class="form-select">
      <option value="">请选择</option>
      <option value="男">男</option>
      <option value="女">女</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">学科</label>
    <input type="text" name="subject" class="form-control" placeholder="如：数学、语文">
  </div>
  <button type="submit" class="btn btn-primary">保存</button>
  <a href="{{ url_for('teachers') }}" class="btn btn-secondary ms-2">取消</a>
</form>
{% endblock %}
