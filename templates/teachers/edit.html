{% extends 'base.html' %}
{% block title %}编辑教师{% endblock %}
{% block content %}
<h3 class="mb-3">编辑教师</h3>
<form method="post" class="col-md-6">
  <div class="mb-3">
    <label class="form-label">工号 *</label>
    <input type="text" name="teacher_id" class="form-control" value="{{ teacher.teacher_id }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">姓名 *</label>
    <input type="text" name="name" class="form-control" value="{{ teacher.name }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">性别</label>
    <select name="gender" class="form-select">
      <option value="">请选择</option>
      <option value="男" {% if teacher.gender == '男' %}selected{% endif %}>男</option>
      <option value="女" {% if teacher.gender == '女' %}selected{% endif %}>女</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">学科</label>
    <input type="text" name="subject" class="form-control" value="{{ teacher.subject or '' }}">
  </div>
  <button type="submit" class="btn btn-primary">保存</button>
  <a href="{{ url_for('teachers') }}" class="btn btn-secondary ms-2">取消</a>
</form>
{% endblock %}
