# ============================================================
# 学校管理系统 - 生产环境 Docker Compose
# 前端和后端各自独立镜像
# 用法: docker compose -f docker-compose.production.yml up -d
# ============================================================

services:
  frontend:
    image: ${FRONTEND_IMAGE:-school-mgmt-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://backend:80}
      - MAIN_SYSTEM_URL=${MAIN_SYSTEM_URL:-https://main.example.com}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - school-mgmt
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    image: ${BACKEND_IMAGE:-school-mgmt-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8084:80"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - school-mgmt
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  school-mgmt:
    driver: bridge
