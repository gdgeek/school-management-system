# CD Pipeline - 学校管理系统
# Builds Docker images and deploys via SSH
# Triggers on push to main or manual dispatch

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'school-management-system/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Only one deploy at a time
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Configure these in GitHub repository secrets/variables
  REGISTRY: ${{ vars.CONTAINER_REGISTRY || 'ghcr.io' }}
  IMAGE_PREFIX: ${{ github.repository_owner }}/school-management

defaults:
  run:
    working-directory: school-management-system

jobs:
  # ──────────────────────────────────────────────
  # Build and push Docker images
  # ──────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      frontend-image: ${{ steps.meta-fe.outputs.tags }}
      backend-image: ${{ steps.meta-be.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Frontend image
      - name: Frontend image metadata
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: school-management-system/frontend
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backend image
      - name: Backend image metadata
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: school-management-system/backend
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Deploy to server via SSH + docker-compose
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "school-management-system/docker-compose.yml,school-management-system/backend/nginx.conf"
          target: ${{ secrets.DEPLOY_PATH || '/opt/school-management' }}
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH || '/opt/school-management' }}"
            cd "$DEPLOY_DIR"

            # Pull latest images
            docker compose pull

            # Restart services with zero-downtime approach
            docker compose up -d --remove-orphans

            # Wait for health checks
            echo "Waiting for services to be healthy..."
            sleep 10

            # Verify deployment
            docker compose ps
            echo "Deployment complete."
